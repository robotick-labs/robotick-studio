name: CI

on:
  push:
    branches:
      - main
      - "release/**"
  pull_request:

permissions:
  contents: read

jobs:
  verify-build:
    name: verify-build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build web app
        run: npm run build

      - name: Build electron main/preload
        run: npm run build:electron

  test-cli:
    name: test-cli
    runs-on: ubuntu-latest
    needs: verify-build
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Test setup
        uses: ./.github/actions/test-setup

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install CLI test dependencies
        run: |
          python -m pip install \
            -e "tools/robotick-cli[dev]" \
            -e "tools/robotick-hub[dev]" \
            -e "robotick-launcher[dev] @ file://$PWD/tools/robotick-launcher"

      - name: Run CLI tests
        run: npm run test:cli

  test-launcher:
    name: test-launcher
    runs-on: ubuntu-latest
    needs: verify-build
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Test setup
        uses: ./.github/actions/test-setup

      - name: Run launcher tests
        run: npm run test:launcher

  test-hub:
    name: test-hub
    runs-on: ubuntu-latest
    needs: verify-build
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run hub tests
        env:
          ROBOTICK_HUB_FORCE_HEADLESS: "1"
        run: |
          python -m venv .studio/.venv
          . .studio/.venv/bin/activate
          pip install --upgrade pip >/dev/null
          pip install -e "tools/robotick-hub[dev]" >/dev/null
          PYTHONPATH=tools/robotick-hub/src pytest -q tools/robotick-hub/tests

  integration-launcher-builds:
    name: integration-launcher-builds (${{ matrix.label }})
    runs-on: ubuntu-latest
    needs: verify-build
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: linux
            model: test-project-spine-linux
            target: linux
          - label: linux-arm64
            model: test-project-spine-arm64
            target: linux
          - label: linux-arm32
            model: test-project-spine-arm32
            target: linux
          - label: esp32
            model: test-project-spine
            target: esp32
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Sync launcher test fixtures
        run: tools/robotick-launcher/tests/sync-fixtures.sh

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run launcher fixture build
        working-directory: ${{ github.workspace }}
        run: |
          python -m venv .studio/.venv
          . .studio/.venv/bin/activate
          pip install --upgrade pip >/dev/null
          pip install -e "robotick-launcher[dev] @ file://$PWD/tools/robotick-launcher" >/dev/null

          BASE_DIR="$PWD/tools/robotick-launcher/tests/test_data/test-project"

          python -m robotick.launcher.cli generate test-project "${{ matrix.model }}" "${{ matrix.target }}" --base-dir "$BASE_DIR" --stub-install
          python -m robotick.launcher.cli build test-project "${{ matrix.model }}" "${{ matrix.target }}" --base-dir "$BASE_DIR" --no-pre

  test-renderer:
    name: test-renderer
    runs-on: ubuntu-latest
    needs: verify-build
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Test setup
        uses: ./.github/actions/test-setup

      - name: Run renderer tests
        run: npx vitest --run --project renderer

  test-electron:
    name: test-electron
    runs-on: ubuntu-latest
    needs: verify-build
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Test setup
        uses: ./.github/actions/test-setup

      - name: Run electron tests
        run: npx vitest --run --project electron

  test-e2e:
    name: test-e2e
    runs-on: ubuntu-latest
    needs: verify-build
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Test setup
        uses: ./.github/actions/test-setup

      - name: Run Playwright Electron e2e tests
        run: xvfb-run -a npm run test:e2e -- tests/e2e/project-selection.spec.ts

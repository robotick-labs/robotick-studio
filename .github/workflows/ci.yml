name: CI

on:
  push:
    branches:
      - main
      - "release/**"
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Build electron main/preload
        run: npm run build:electron

  launcher-tests:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Test setup
        uses: ./.github/actions/test-setup

      - name: Run launcher tests
        run: npm run test:launcher

  renderer-tests:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Test setup
        uses: ./.github/actions/test-setup

      - name: Run renderer tests
        run: npx vitest --run --project renderer

  electron-tests:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Test setup
        uses: ./.github/actions/test-setup

      - name: Run electron tests
        run: npx vitest --run --project electron

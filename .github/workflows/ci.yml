name: CI

on:
  push:
    branches:
      - main
      - "release/**"
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build web app
        run: npm run build

      - name: Build electron main/preload
        run: npm run build:electron

  launcher-tests:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Test setup
        uses: ./.github/actions/test-setup

      - name: Run launcher tests
        run: npm run test:launcher

  launcher-integration-builds:
    name: launcher-integration-builds (${{ matrix.label }})
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: linux
            model: test-project-spine-linux
            target: linux
            install_linux_deps: true
          - label: linux-arm64
            model: test-project-spine-arm64
            target: linux
            install_linux_deps: false
          - label: linux-arm32
            model: test-project-spine-arm32
            target: linux
            install_linux_deps: false
          - label: esp32
            model: test-project-spine
            target: esp32
            install_linux_deps: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Sync launcher test fixtures
        run: tools/robotick-launcher/tests/sync-fixtures.sh

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install native Linux build deps
        if: matrix.install_linux_deps
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            libcurl4-openssl-dev \
            libkissfft-dev \
            libopencv-dev \
            libsdl2-dev \
            libsdl2-gfx-dev \
            libsdl2-ttf-dev \
            libssl-dev \
            libyaml-cpp-dev \
            ninja-build \
            pkg-config

      - name: Run launcher fixture build
        working-directory: ${{ github.workspace }}
        run: |
          python -m venv .studio/.venv
          . .studio/.venv/bin/activate
          pip install --upgrade pip >/dev/null
          pip install -e "robotick-launcher[dev] @ file://$PWD/tools/robotick-launcher" >/dev/null

          BASE_DIR="$PWD/tools/robotick-launcher/tests/test_data/test-project"

          python -m robotick.launcher.cli generate test-project "${{ matrix.model }}" "${{ matrix.target }}" --base-dir "$BASE_DIR" --stub-install
          python -m robotick.launcher.cli build test-project "${{ matrix.model }}" "${{ matrix.target }}" --base-dir "$BASE_DIR" --no-pre

  renderer-tests:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Test setup
        uses: ./.github/actions/test-setup

      - name: Run renderer tests
        run: npx vitest --run --project renderer

  electron-tests:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Test setup
        uses: ./.github/actions/test-setup

      - name: Run electron tests
        run: npx vitest --run --project electron

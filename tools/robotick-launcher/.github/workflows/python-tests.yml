# .github/workflows/python-tests.yml
name: Python CI – Conductor/Launcher

on:
  push:
    branches: [main, dev]
    paths: [".github/workflows/**", "src/**", "tests/**", "pyproject.toml", "pytest.ini"]
  pull_request:
    branches: [main, dev]
    paths: [".github/workflows/**", "src/**", "tests/**", "pyproject.toml", "pytest.ini"]
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  tests:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          cache-dependency-path: |
            pyproject.toml
            **/requirements*.txt

      - name: Install project + test deps
        run: |
          python -m pip install -U pip wheel setuptools
          python -m pip install -e ".[dev]"

      - name: Run tests
        run: |
          pytest -q -ra --maxfail=1 --disable-warnings --color=yes

      # Optional: coverage artifact
      # - name: Run tests with coverage
      #   run: pytest -q --cov=src --cov-report=xml
      # - name: Upload coverage
      #   uses: actions/upload-artifact@v4
      #   with:
      #     name: coverage-xml
      #     path: coverage.xml

# Robotick model: Test Project Brain (host-side UI, camera, and remote control)

telemetry:
  port: 7090

remote_models:
  - name: spine
    mode: IP

    # remote connections:
    connections:
      - from: remote_control.outputs.left.x
        to_remote: steering_mixer.inputs.turn_rate
      - from: remote_control.outputs.left.y
        to_remote: steering_mixer.inputs.speed

workloads:
  - name: remote_control
    type: RemoteControlWorkload
    tick_rate_hz: 30.0
    inputs:
      use_web_inputs: true
      left.x: 0.0
      left.y: 0.0

  - name: face
    type: FaceDisplayWorkload
    tick_rate_hz: 30.0
    config:
      blink_min_interval_sec: 1.5
      blink_max_interval_sec: 4.0
      render_to_texture: true

  - name: speech_to_text # included to ensure we're testing its "bespoke cmake file" usage is working
    type: SpeechToTextWorkload
    tick_rate_hz: 30.0

  - name: camera
    type: MonocularCameraWorkload
    tick_rate_hz: 30.0

  - name: mic
    type: MicWorkload
    tick_rate_hz: 30.0

  - name: root_group
    type: SyncedGroupWorkload
    tick_rate_hz: 30.0
    children:
      - remote_control
      - face
      - camera
      - mic
      - speech_to_text

root: root_group

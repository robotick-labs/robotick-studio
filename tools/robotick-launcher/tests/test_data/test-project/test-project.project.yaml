# Project-level configuration for the 'test-project' robot

name: "Test Project"
schema_version: 1
description: "Test Project for use in Launcher Unit Tests."

tooling:
  robotick:
    local_path: ${PROJECT_DIR}/../../..  # Points back to the repo root that already contains the tooling

runtime:
  engine:
    local_path: ${PROJECT_DIR}/../../../../robotick-engine  # Resolves to the sibling engine checkout bundled with the tests
  workloads:
    - local_path: ../workloads/cpp/include  # Resolves to tests/launcher/test_data/workloads/cpp/include
    - local_path: ../workloads/cpp/src  # Resolves to tests/launcher/test_data/workloads/cpp/src
  shared: []
  python_roots:
    - id: main-brain
      local_path: python  # Resolves to tests/launcher/test_data/test-project/python
      requirements: requirements.txt
    - id: scripts
      local_path: tools/scripts  # Resolves to tests/launcher/test_data/test-project/tools/scripts

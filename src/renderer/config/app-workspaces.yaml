# Top-level workspace configuration (YAML)
workspaces:
  - id: home
    path: /home
    label: Home
    group: project-select
    module: ./components/editors/home/HomePage.tsx
  - id: project
    path: /project
    label: Project
    group: dev
    module: ./components/editors/project/ProjectPage.tsx
  - id: models
    path: /models
    label: Models
    group: dev
    module: ./components/editors/models/ModelsPage.tsx
  - id: remote-control
    path: /remote-control
    label: Remote Control
    group: test
    module: ./components/editors/remote-control/RemoteControlPage.tsx
  - id: telemetry
    path: /telemetry
    label: Telemetry
    group: test
    module: ./components/editors/telemetry/TelemetryPage.tsx
  - id: terminal
    path: /terminal
    label: Terminal
    group: test
    module: ./components/editors/terminal/TerminalPage.tsx
  - id: help
    path: /help
    label: Help
    group: help
    module: ./components/editors/help/HelpPage.tsx

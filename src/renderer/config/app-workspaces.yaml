# Top-level workspace configuration (YAML)
workspaces:
  - id: home
    path: /home
    label: Home
    group: project-select
    editor: home
  - id: project
    path: /project
    label: Project
    group: dev
    editor: project
  - id: models
    path: /models
    label: Models
    group: dev
    editor: models
  - id: remote-control
    path: /remote-control
    label: Remote Control
    group: test
    editor: remote-control
  - id: telemetry
    path: /telemetry
    label: Telemetry
    group: test
    editor: telemetry
  - id: terminal
    path: /terminal
    label: Terminal
    group: test
    editor: terminal
  - id: help
    path: /help
    label: Help
    group: help
    editor: help
